---
- name: Baseline all nodes
  hosts: all
  roles:
    - common
    - ssh_hardening
    - nfs_client
    - ldap_client
    - monitoring

- name: SLURM controller (head nodes)
  hosts: head_nodes
  tasks:
    - name: Install slurmctld
      ansible.builtin.dnf:
        name: [slurm, slurm-slurmctld, munge]
        state: present
    - name: Enable slurmctld
      ansible.builtin.systemd:
        name: slurmctld
        enabled: true
        state: started

- name: SLURM compute (worker nodes)
  hosts: compute_nodes
  tasks:
    - name: Install slurmd
      ansible.builtin.dnf:
        name: [slurm, slurm-slurmd, munge]
        state: present
    - name: Enable slurmd
      ansible.builtin.systemd:
        name: slurmd
        enabled: true
        state: started
