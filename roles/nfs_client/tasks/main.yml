---
- name: Install nfs-utils
  ansible.builtin.dnf:
    name: nfs-utils
    state: present

- name: Create mount points
  ansible.builtin.file:
    path: "{{ item.mount }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_mounts }}"

- name: Mount NFS shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.mount }}"
    fstype: nfs4
    opts: "{{ item.opts }}"
    state: mounted
  loop: "{{ nfs_mounts }}"
