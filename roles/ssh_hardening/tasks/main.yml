---
- name: Harden sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: /usr/sbin/sshd -t -f %s
  loop:
    - { regexp: '^#?PermitRootLogin',       line: "PermitRootLogin {{ ssh_permit_root }}" }
    - { regexp: '^#?PasswordAuthentication', line: "PasswordAuthentication {{ ssh_password_auth }}" }
    - { regexp: '^#?MaxAuthTries',           line: "MaxAuthTries {{ ssh_max_auth_tries }}" }
    - { regexp: '^#?AllowGroups',            line: "AllowGroups {{ ssh_allowed_groups }}" }
    - { regexp: '^#?X11Forwarding',          line: "X11Forwarding no" }
    - { regexp: '^#?ClientAliveInterval',    line: "ClientAliveInterval 300" }
    - { regexp: '^#?ClientAliveCountMax',    line: "ClientAliveCountMax 2" }
  notify: restart sshd

- name: Ensure sshd running
  ansible.builtin.systemd:
    name: sshd
    state: started
    enabled: true
